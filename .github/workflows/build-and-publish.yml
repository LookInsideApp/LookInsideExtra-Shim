name: Build and Publish

on:
  workflow_dispatch:
    inputs:
      source_id:
        description: Optional source id to build (e.g. "authenticator")
        required: false
        type: string
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 90
    env:
      GH_TOKEN: ${{ secrets.UPSTREAM_MIRROR_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.UPSTREAM_MIRROR_TOKEN }}
      UPSTREAM_MIRROR_TOKEN: ${{ secrets.UPSTREAM_MIRROR_TOKEN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.UPSTREAM_MIRROR_TOKEN }}

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Install xcbeautify
        run: brew install xcbeautify

      - name: Build and publish
        run: |
          if [ -n "${{ inputs.source_id }}" ]; then
            ./Scripts/build_and_publish.py --source "${{ inputs.source_id }}"
          else
            ./Scripts/build_and_publish.py
          fi

      - name: Commit updated manifest
        run: |
          if git diff --quiet -- Package.swift Sources; then
            echo "No manifest changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Package.swift Sources
          git commit -m "Build and publish"
          git push
