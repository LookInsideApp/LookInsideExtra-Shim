name: Build and Publish

on:
  workflow_dispatch:
    inputs:
      source_id:
        description: Optional source id to build (e.g. "swiftui-support")
        required: false
        type: string
      version:
        description: Explicit X.Y.Z release tag. Defaults to latest patch + 1.
        required: false
        type: string

concurrency:
  group: build-and-publish-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    # Pin the runner image so toolchain availability stays predictable.
    # macos-26-arm64 ships Xcode 26.x preinstalled, matching the local
    # build environment.
    runs-on: macos-26
    timeout-minutes: 90
    env:
      GH_TOKEN: ${{ secrets.UPSTREAM_MIRROR_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.UPSTREAM_MIRROR_TOKEN }}
      UPSTREAM_MIRROR_TOKEN: ${{ secrets.UPSTREAM_MIRROR_TOKEN }}
      UPSTREAM_SERVER_REPO_URL: ${{ secrets.UPSTREAM_SERVER_REPO_URL }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.UPSTREAM_MIRROR_TOKEN }}
          fetch-depth: 0

      - name: Select Xcode
        # Xcode 26.4.1 matches the locally verified xcframework build and
        # is preinstalled on the macos-26 runner image.
        run: |
          sudo xcode-select -s /Applications/Xcode_26.4.1.app/Contents/Developer
          xcodebuild -version
          swift --version

      - name: Install xcbeautify
        run: brew install xcbeautify

      - name: Install CocoaPods
        run: gem install cocoapods --no-document

      - name: Determine next release version
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          git fetch --force --tags origin
          latest_tag="$(git tag --list --sort=-version:refname | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | head -n 1)"
          next_tag="$(python3 - "$latest_tag" <<'PY'
          import os
          import re
          import sys

          latest = sys.argv[1]
          override = os.environ.get("INPUT_VERSION", "").strip()

          if override:
              if not re.fullmatch(r"\d+\.\d+\.\d+", override):
                  sys.exit(f"Invalid version override: {override!r}. Expected X.Y.Z.")
              if latest:
                  l_major, l_minor, l_patch = (int(p) for p in latest.split("."))
                  o_major, o_minor, o_patch = (int(p) for p in override.split("."))
                  if (o_major, o_minor, o_patch) <= (l_major, l_minor, l_patch):
                      sys.exit(f"Version override {override} must be greater than latest tag {latest}.")
              print(override)
              raise SystemExit

          if not latest:
              print("0.1.0")
              raise SystemExit

          major, minor, patch = (int(part) for part in latest.split("."))
          print(f"{major}.{minor}.{patch + 1}")
          PY
          )"
          echo "latest_tag=$latest_tag" >> "$GITHUB_OUTPUT"
          echo "next_tag=$next_tag" >> "$GITHUB_OUTPUT"
          echo "Next release tag: $next_tag"

      - name: Build binaries and render manifest
        run: |
          if [ -n "${{ inputs.source_id }}" ]; then
            ./Scripts/build_and_publish.py \
              --release-tag "${{ steps.version.outputs.next_tag }}" \
              --source "${{ inputs.source_id }}"
          else
            ./Scripts/build_and_publish.py \
              --release-tag "${{ steps.version.outputs.next_tag }}"
          fi

      - name: Commit updated manifest
        id: commit
        run: |
          if git diff --quiet -- Package.swift Tests LookInsideServer.podspec; then
            echo "No manifest changes to commit."
            echo "created_commit=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Package.swift Tests LookInsideServer.podspec
          git commit -m "Build and publish ${{ steps.version.outputs.next_tag }}"
          git tag "${{ steps.version.outputs.next_tag }}"
          git push origin HEAD:main "${{ steps.version.outputs.next_tag }}"
          echo "created_commit=true" >> "$GITHUB_OUTPUT"

      - name: Publish version release
        if: steps.commit.outputs.created_commit == 'true'
        run: |
          gh release create "${{ steps.version.outputs.next_tag }}" \
            --verify-tag \
            --title "${{ steps.version.outputs.next_tag }}" \
            --notes "SwiftPM and CocoaPods release ${{ steps.version.outputs.next_tag }}." \
            build/release-assets/*.zip

      - name: Lint CocoaPods podspec
        if: steps.commit.outputs.created_commit == 'true'
        run: pod spec lint LookInsideServer.podspec --allow-warnings

      - name: Build CocoaPods integration fixture
        if: steps.commit.outputs.created_commit == 'true'
        run: Scripts/test_cocoapods_integration.sh "${{ steps.version.outputs.next_tag }}"
