name: Sign Auth Server

on:
  workflow_dispatch:
    inputs:
      source_repo:
        description: Upstream repo that publishes the unsigned auth server app zip.
        required: true
        type: string
        default: LookInsideApp/LookInsideAuthenticator
      source_tag:
        description: Upstream release tag to pull the unsigned app zip from.
        required: true
        type: string
      source_asset:
        description: Unsigned asset file name on the upstream release.
        required: true
        type: string
        default: lookinside-auth-server.app.zip
      output_asset:
        description: Signed asset file name to upload to the storage release.
        required: true
        type: string
        default: lookinside-auth-server.app.zip

permissions:
  contents: write

concurrency:
  group: sign-auth-server-main
  cancel-in-progress: false

jobs:
  sign:
    runs-on: macos-latest
    timeout-minutes: 60
    env:
      GH_TOKEN: ${{ secrets.UPSTREAM_MIRROR_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.UPSTREAM_MIRROR_TOKEN }}
      UPSTREAM_MIRROR_TOKEN: ${{ secrets.UPSTREAM_MIRROR_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.UPSTREAM_MIRROR_TOKEN }}

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Download Unsigned App
        id: download
        run: |
          set -euo pipefail
          mkdir -p build/unsigned build/extracted
          asset_path="build/unsigned/${{ inputs.source_asset }}"
          gh release download "${{ inputs.source_tag }}" \
            --repo "${{ inputs.source_repo }}" \
            --pattern "${{ inputs.source_asset }}" \
            --output "$asset_path" \
            --clobber
          echo "asset_path=$asset_path" >> "$GITHUB_OUTPUT"

      - name: Extract App Bundle
        id: extract
        run: |
          set -euo pipefail
          cd build/extracted
          ditto -x -k "../../${{ steps.download.outputs.asset_path }}" .
          app_path="$(find . -maxdepth 2 -type d -name "*.app" | head -n 1)"
          [[ -n "$app_path" ]] || { echo "No .app bundle found in upstream asset." >&2; exit 1; }
          absolute_app_path="$(cd "$(dirname "$app_path")" && pwd)/$(basename "$app_path")"
          echo "app_path=$absolute_app_path" >> "$GITHUB_OUTPUT"
          echo "Extracted app: $absolute_app_path"

      - name: Setup Keychain and Signing Env
        id: setup_keychain
        env:
          KEYCHAIN_CONTENT_GZIP: ${{ secrets.KEYCHAIN_CONTENT_GZIP }}
          KEYCHAIN_SECRET: ${{ secrets.KEYCHAIN_SECRET }}
        run: bash Scripts/setup-ci-keychain.sh --output-file "$GITHUB_OUTPUT"

      - name: Sign and Notarize App
        env:
          SIGNING_IDENTITY: ${{ steps.setup_keychain.outputs.signing_identity }}
          DEVELOPMENT_TEAM: ${{ steps.setup_keychain.outputs.development_team }}
          KEYCHAIN_PATH: ${{ steps.setup_keychain.outputs.keychain_path }}
          KEYCHAIN_PROFILE: ${{ steps.setup_keychain.outputs.keychain_profile }}
          KEYCHAIN_SECRET: ${{ secrets.KEYCHAIN_SECRET }}
        run: |
          bash Scripts/sign-and-notarize-app.sh \
            --app "${{ steps.extract.outputs.app_path }}" \
            --output "build/signed/${{ inputs.output_asset }}"

      - name: Ensure Storage Release Exists
        run: |
          set -euo pipefail
          if ! gh release view storage --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create storage \
              --repo "$GITHUB_REPOSITORY" \
              --title "Binary Storage" \
              --notes "Signed binary artifacts. Always the latest build."
          fi

      - name: Upload Signed App
        run: |
          gh release upload storage "build/signed/${{ inputs.output_asset }}" \
            --repo "$GITHUB_REPOSITORY" \
            --clobber

      - name: Upload Checksum
        run: |
          set -euo pipefail
          cd build/signed
          shasum -a 256 "${{ inputs.output_asset }}" > "${{ inputs.output_asset }}.sha256"
          gh release upload storage "${{ inputs.output_asset }}.sha256" \
            --repo "$GITHUB_REPOSITORY" \
            --clobber
