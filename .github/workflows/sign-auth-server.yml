name: Build and Publish Auth Server

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: Git ref (branch, tag, or SHA) of LookInside-Auth to build.
        required: true
        type: string
        default: main
      output_asset:
        description: Signed asset file name to upload to the storage release.
        required: true
        type: string
        default: lookinside-auth-server.app.zip

permissions:
  contents: write

concurrency:
  group: build-auth-server-main
  cancel-in-progress: false

jobs:
  build_and_sign:
    runs-on: macos-latest
    timeout-minutes: 60
    env:
      GH_TOKEN: ${{ github.token }}
      GITHUB_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout shim repository
        uses: actions/checkout@v4
        with:
          ref: main
          path: shim
          token: ${{ github.token }}

      - name: Checkout authenticator source
        uses: actions/checkout@v4
        with:
          repository: LookInsideApp/LookInside-Auth
          ref: ${{ inputs.source_ref }}
          path: authenticator
          token: ${{ secrets.LOOKINSIDE_WEB_RELEASE_TOKEN || secrets.UPSTREAM_MIRROR_TOKEN }}

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Install mise
        run: brew install mise

      - name: Install tuist via mise
        working-directory: authenticator
        run: |
          mise trust
          mise install

      - name: Compute build timestamp
        id: stamp
        run: |
          set -euo pipefail
          stamp="$(date -u +%Y.%m%d.%H%M%S)"
          echo "marketing_version=$stamp" >> "$GITHUB_OUTPUT"
          echo "Build timestamp: $stamp"

      - name: Build unsigned auth server app
        working-directory: authenticator
        env:
          MARKETING_VERSION: ${{ steps.stamp.outputs.marketing_version }}
        run: make app

      - name: Extract app bundle
        id: extract
        run: |
          set -euo pipefail
          mkdir -p build/extracted
          ditto -x -k authenticator/lookinside-auth-server.app.zip build/extracted
          app_path="$(find build/extracted -maxdepth 2 -type d -name "*.app" | head -n 1)"
          [[ -n "$app_path" ]] || { echo "No .app bundle found after extraction." >&2; exit 1; }
          absolute_app_path="$(cd "$(dirname "$app_path")" && pwd)/$(basename "$app_path")"
          echo "app_path=$absolute_app_path" >> "$GITHUB_OUTPUT"
          echo "Extracted app: $absolute_app_path"

      - name: Setup keychain and signing env
        id: setup_keychain
        env:
          KEYCHAIN_CONTENT_GZIP: ${{ secrets.KEYCHAIN_CONTENT_GZIP }}
          KEYCHAIN_SECRET: ${{ secrets.KEYCHAIN_SECRET }}
        run: bash shim/Scripts/setup-ci-keychain.sh --output-file "$GITHUB_OUTPUT"

      - name: Sign and notarize app
        env:
          SIGNING_IDENTITY: ${{ steps.setup_keychain.outputs.signing_identity }}
          DEVELOPMENT_TEAM: ${{ steps.setup_keychain.outputs.development_team }}
          KEYCHAIN_PATH: ${{ steps.setup_keychain.outputs.keychain_path }}
          KEYCHAIN_PROFILE: ${{ steps.setup_keychain.outputs.keychain_profile }}
          KEYCHAIN_SECRET: ${{ secrets.KEYCHAIN_SECRET }}
        run: |
          bash shim/Scripts/sign-and-notarize-app.sh \
            --app "${{ steps.extract.outputs.app_path }}" \
            --output "build/signed/${{ inputs.output_asset }}"

      - name: Ensure storage release exists
        working-directory: shim
        run: |
          set -euo pipefail
          if ! gh release view storage --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create storage \
              --repo "$GITHUB_REPOSITORY" \
              --title "Binary Storage" \
              --notes "Signed binary artifacts. Always the latest build."
          fi

      - name: Upload signed app
        run: |
          gh release upload storage "build/signed/${{ inputs.output_asset }}" \
            --repo "$GITHUB_REPOSITORY" \
            --clobber

      - name: Upload checksum
        run: |
          set -euo pipefail
          cd build/signed
          shasum -a 256 "${{ inputs.output_asset }}" > "${{ inputs.output_asset }}.sha256"
          gh release upload storage "${{ inputs.output_asset }}.sha256" \
            --repo "$GITHUB_REPOSITORY" \
            --clobber

      - name: Upload version marker
        env:
          MARKETING_VERSION: ${{ steps.stamp.outputs.marketing_version }}
        run: |
          set -euo pipefail
          cd build/signed
          version_asset="${{ inputs.output_asset }}.version"
          printf '%s\n' "$MARKETING_VERSION" > "$version_asset"
          gh release upload storage "$version_asset" \
            --repo "$GITHUB_REPOSITORY" \
            --clobber

      - name: Validate Web Publishing Secret
        env:
          LOOKINSIDE_WEB_RELEASE_TOKEN: ${{ secrets.LOOKINSIDE_WEB_RELEASE_TOKEN || secrets.UPSTREAM_MIRROR_TOKEN }}
        run: |
          set -euo pipefail
          [[ -n "$LOOKINSIDE_WEB_RELEASE_TOKEN" ]] || { echo "LOOKINSIDE_WEB_RELEASE_TOKEN or UPSTREAM_MIRROR_TOKEN secret is required." >&2; exit 1; }

      - name: Checkout web repository
        uses: actions/checkout@v4
        with:
          repository: LookInsideApp/LookInside-Web
          ref: main
          path: web
          token: ${{ secrets.LOOKINSIDE_WEB_RELEASE_TOKEN || secrets.UPSTREAM_MIRROR_TOKEN }}

      - name: Sync signed app to web
        run: |
          set -euo pipefail
          bash shim/Scripts/sync-auth-server-assets-to-web.sh \
            --web-dir web \
            --asset "build/signed/${{ inputs.output_asset }}"

      - name: Commit web auth server assets
        working-directory: web
        env:
          MARKETING_VERSION: ${{ steps.stamp.outputs.marketing_version }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/downloads/auth-server
          if git diff --cached --quiet; then
            echo "No Web auth server changes to publish."
            exit 0
          fi
          git commit -m "Publish Auth Server $MARKETING_VERSION"
          git push origin HEAD:main
